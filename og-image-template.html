<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    .container {
      width: 1200px;
      height: 630px;
      background-color: #FAFAF8;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 100px;
      position: relative;
    }

    /* Paper vignette */
    .container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 150% 150% at 50% 45%, transparent 25%, rgba(200, 184, 160, 0.10) 100%);
      pointer-events: none;
    }

    /* Warm bottom wash */
    .container::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(212, 196, 176, 0.035) 0%, transparent 50%);
      pointer-events: none;
    }

    .wordmark {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 64px;
      font-weight: 400;
      line-height: 1.15;
      letter-spacing: 0.02em;
      color: #1a1a1a;
      position: relative;
      z-index: 1;
      margin-bottom: 24px;
    }

    .tagline {
      font-family: 'Instrument Sans', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.3em;
      color: #737373;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="wordmark">
      Sullivan<br>
      Street<br>
      Projects
    </div>
    <div class="tagline">GROWTH MARKETING PARTNERS</div>
  </div>
</body>
</html>
